name: 🚀 Deploy to AWS S3 + CloudFront

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ──────────────────────────────────────
      # 1. Checkout Code
      # ──────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────
      # 2. Setup Node.js
      # ──────────────────────────────────────
      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ──────────────────────────────────────
      # 3. Install Dependencies
      # ──────────────────────────────────────
      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      # ──────────────────────────────────────
      # 4. Build for Production
      # ──────────────────────────────────────
      - name: 🏗️ Build production bundle
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_WALLET_API_URL: ${{ secrets.REACT_APP_WALLET_API_URL }}
          REACT_APP_CHATBOT_API_URL: ${{ secrets.REACT_APP_CHATBOT_API_URL }}
          REACT_APP_VERIFICATION_API_URL: 'https://wgywp2sazh56bc7zg7ydni2uv40xfzji.lambda-url.ap-south-1.on.aws'
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          CI: false  # Prevents treating warnings as errors

      # ──────────────────────────────────────
      # 5. Configure AWS Credentials
      # ──────────────────────────────────────
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ──────────────────────────────────────
      # 6. Deploy to S3
      # ──────────────────────────────────────
      - name: 🪣 Sync build to S3
        run: |
          aws s3 sync build/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "service-worker.js" \
            --exclude "asset-manifest.json"

      # Upload HTML and manifest with no-cache
      - name: 📄 Upload index.html (no-cache)
        run: |
          aws s3 cp build/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      # ──────────────────────────────────────
      # 7. Invalidate CloudFront Cache
      # ──────────────────────────────────────
      - name: 🌐 Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
